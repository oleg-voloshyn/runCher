<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- RUN — orange -->
  <text
    x="256" y="228"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="165"
    fill="#fc4c02"
    text-anchor="middle"
    textLength="370"
    lengthAdjust="spacingAndGlyphs">RUN</text>

  <!-- thin orange divider at canvas center -->
  <rect x="76" y="253" width="360" height="3" rx="1.5" fill="#fc4c02" opacity="0.4"/>

  <!-- CHER — white -->
  <text
    x="256" y="400"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="165"
    fill="white"
    text-anchor="middle"
    textLength="370"
    lengthAdjust="spacingAndGlyphs">CHER</text>
</svg>
